<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>title</title>
    <script src="script.js"></script>
<head>
  <style> body { margin: 0; } </style>

  <!--<script src="//cdn.jsdelivr.net/npm/3d-force-graph"></script>-->
  <!--<script src="../../dist/3d-force-graph.js"></script>-->
  
</head>

<body>

  <div id="3d-graph"></div>
   
  <script type="module">
    import ForceGraph3D from 'https://esm.sh/3d-force-graph';
    import SpriteText from "https://esm.sh/three-spritetext";
    import * as THREE from 'https://esm.sh/three';
    import {Pane} from 'https://cdn.jsdelivr.net/npm/tweakpane@4.0.5/dist/tweakpane.min.js';
 
      const Graph = new ForceGraph3D(document.getElementById('3d-graph'))
          .jsonUrl('../datasets/trial2.json')
      //    .nodeLabel(node => `${node.user}: ${node.description}`)
      //    .nodeAutoColorBy('group')
      //    .nodeLabel('text') //scholar or #keyword or discipline
      //    .onNodeClick(node => window.open(node.website))
          // cross-link node objects

      const N = 400
      const gData = {
        nodes: [...Array(N).keys()].map(i => ({ id: i })),
        links: [...Array(N).keys()]
            .filter(id => id)
            .map(id => ({
              source: id,
              target: Math.round(Math.random() * (id-1))
            }))
        }

     
    gData.links.forEach(link => {
      const a = gData.nodes[link.source];
      const b = gData.nodes[link.target];
      !a.neighbors && (a.neighbors = []);
      !b.neighbors && (b.neighbors = []);
      a.neighbors.push(b);
      b.neighbors.push(a);

      !a.links && (a.links = []);
      !b.links && (b.links = []);
      a.links.push(link);
      b.links.push(link);
    });

    const NODE_R = 8;

    const highlightNodes = new Set();
    const highlightLinks = new Set();
    let hoverNode = null;

    const elem = document.getElementById('graph');

    new ForceGraph(elem)
      .graphData(gData)
      .nodeRelSize(NODE_R)
      .onNodeHover(node => {
        highlightNodes.clear();
        highlightLinks.clear();
        if (node) {
          highlightNodes.add(node);
          node.neighbors.forEach(neighbor => highlightNodes.add(neighbor));
          node.links.forEach(link => highlightLinks.add(link));
        }

        hoverNode = node || null;
      })
      .onLinkHover(link => {
        highlightNodes.clear();
        highlightLinks.clear();

        if (link) {
          highlightLinks.add(link);
          highlightNodes.add(link.source);
          highlightNodes.add(link.target);
        }
      })
      .autoPauseRedraw(false) // keep redrawing after engine has stopped
      .linkWidth(link => highlightLinks.has(link) ? 5 : 1)
      .linkDirectionalParticles(4)
      .linkDirectionalParticleWidth(link => highlightLinks.has(link) ? 4 : 0)
      .nodeCanvasObjectMode(node => highlightNodes.has(node) ? 'before' : undefined)
      .nodeCanvasObject((node, ctx) => {
        // add ring just for highlighted nodes
        ctx.beginPath();
        ctx.arc(node.x, node.y, NODE_R * 1.4, 0, 2 * Math.PI, false);
        ctx.fillStyle = node === hoverNode ? 'red' : 'orange';
        ctx.fill();
      })

        .nodeThreeObject(node => {
         const imgTexture = new THREE.TextureLoader().load(`./imgs/hashtag3.png`);
          imgTexture.colorSpace = THREE.SRGBColorSpace;
          const material = new THREE.SpriteMaterial({ map: imgTexture });
          const sprite = new THREE.Sprite(material);
          sprite.scale.set(12, 12);
          return sprite})
        

  </script>
</body>
</html>
