<!DOCTYPE html>
<html lang="en">
  
<head>
  <meta charset="utf-8">
  <title>JTC Visualization</title>
  <style> body { margin: 0; } </style>  
  <script src="script.js"></script>
  <script src="//cdn.jsdelivr.net/npm/3d-force-graph"></script>
  <!--<script src="../../dist/3d-force-graph.js"></script>-->
  
</head>

<body>

  <div id="3d-graph"></div>
   
  <script type="module">
    import SpriteText from "https://esm.sh/three-spritetext";
    import * as THREE from 'https://esm.sh/three';
    import {Pane} from 'https://cdn.jsdelivr.net/npm/tweakpane@4.0.5/dist/tweakpane.min.js';



  // Random tree
    const N = 80;
    const gData = {
      nodes: [...Array(N).keys()].map(i => ({ id: i })),
      links: [...Array(N).keys()]
        .filter(id => id)
        .map(id => ({
          source: id,
          target: Math.round(Math.random() * (id-1))
        }))
    };

    // cross-link node objects
    gData.links.forEach(link => {
      const a = gData.nodes[link.source];
      const b = gData.nodes[link.target];
      !a.neighbors && (a.neighbors = []);
      !b.neighbors && (b.neighbors = []);
      a.neighbors.push(b);
      b.neighbors.push(a);

      !a.links && (a.links = []);
      !b.links && (b.links = []);
      a.links.push(link);
      b.links.push(link);
    });

    const highlightNodes = new Set();
    const highlightLinks = new Set();
    let hoverNode = null;

const elem = document.getElementById('3d-graph')
const Graph = new ForceGraph3D(document.getElementById('3d-graph'))

//  const Graph = new ForceGraph3D(document.getElementById('3d-graph'))


.graphData(gData)
        .nodeColor(node => highlightNodes.has(node) ? node === hoverNode ? 'rgb(255,0,0,1)' : 'rgba(255,160,0,0.8)' : 'rgba(0,255,255,0.6)')
        .linkWidth(link => highlightLinks.has(link) ? 4 : 1)
        .linkDirectionalParticles(link => highlightLinks.has(link) ? 4 : 0)
        .linkDirectionalParticleWidth(4)
        .onNodeHover(node => {
          // no state change
          if ((!node && !highlightNodes.size) || (node && hoverNode === node)) return;

          highlightNodes.clear();
          highlightLinks.clear();
          if (node) {
            highlightNodes.add(node);
            node.neighbors.forEach(neighbor => highlightNodes.add(neighbor));
            node.links.forEach(link => highlightLinks.add(link));
          }

          hoverNode = node || null;

          updateHighlight();
        })
        .onLinkHover(link => {
          highlightNodes.clear();
          highlightLinks.clear();

          if (link) {
            highlightLinks.add(link);
            highlightNodes.add(link.source);
            highlightNodes.add(link.target);
          }

          updateHighlight();
        })

   .jsonUrl('../datasets/trial2.json')
   .nodeLabel(node => `${node.user}: ${node.description}`)
   .nodeResolution([12])
   .onNodeClick(node => {
      // Aim at node from outside it
      const distance = 60;
      const distRatio = 1 + distance / Math.hypot(node.x, node.y, node.z);
      const newPos = node.x || node.y || node.z
         ? {x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio}
         : {x: 0, y: 0, z: distance}; // special case if node is in (0,0,0)

      Graph.cameraPosition(
         newPos, // new position
         node, // lookAt ({ x, y, z })
         3000  // ms transition duration
      );
   })
   .nodeAutoColorBy('group')
   .nodeThreeObjectExtend(node =>{
      return !(["discipline", "keywords", "structure"].includes(node.type));
   })
   .nodeLabel('text') //scholar or #keyword or discipline
   .nodeThreeObject(node => {
      const textSprite = new SpriteText(node.label ?? node.id);

      if(node.type === "scholar"){
         const sprite = new SpriteText(node.id);
         sprite.material.depthWrite = true; // make sprite background transparent
         sprite.color = node.color;
         sprite.textHeight = 4;
         sprite.center.y = -1.2; // shift above node
         return sprite;
      }
      else if(node.type === "discipline"){
         textSprite.material.depthWrite = false; // make sprite background transparent
         textSprite.color = node.color;
         textSprite.center.y = 2.2; // shift above node
         const imgTexture = new THREE.TextureLoader().load(`./imgs/discipline.png`);
         imgTexture.colorSpace = THREE.SRGBColorSpace;
         const material = new THREE.SpriteMaterial({map: imgTexture});
         const sprite = new THREE.Sprite(material);
         sprite.scale.set(14, 14);
         textSprite.textHeight = 4 / 10; // needs refining
         sprite.add(textSprite);
         return sprite;
      }
      else if(node.type === "keywords"){
         textSprite.material.depthWrite = false; // make sprite background transparent
         textSprite.color = node.color;
         textSprite.center.y = 2.2; // shift above node
         const imgTexture = new THREE.TextureLoader().load(`./imgs/hashtag.png`);
         imgTexture.colorSpace = THREE.SRGBColorSpace;
         const material = new THREE.SpriteMaterial({map: imgTexture});
         const sprite = new THREE.Sprite(material);
         sprite.scale.set(10, 10);
         textSprite.textHeight = 4 / 8; // needs refining
         sprite.add(textSprite);
         node.size = 0.1;
         return sprite;
      }
      else if(node.type === "structure"){
         textSprite.material.depthWrite = false; // make sprite background transparent
         textSprite.color = node.color;
         textSprite.center.y = 2.2; // shift above node
         const imgTexture = new THREE.TextureLoader().load(`./imgs/structure.png`);
         imgTexture.colorSpace = THREE.SRGBColorSpace;
         const material = new THREE.SpriteMaterial({map: imgTexture});
         const sprite = new THREE.Sprite(material);
         sprite.scale.set(14, 14);
         textSprite.textHeight = 4 / 10; // needs refining
         sprite.add(textSprite);
         return sprite;
      }
      textSprite.textHeight = 4;
      return textSprite;
   });

Graph.d3Force('charge').strength(-120);

  function updateHighlight() {
      // trigger update of highlighted objects in scene
      Graph
        .nodeColor(Graph.nodeColor())
        .linkWidth(Graph.linkWidth())
        .linkDirectionalParticles(Graph.linkDirectionalParticles());
    }

   </script>
</body>
</html>
